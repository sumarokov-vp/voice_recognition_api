services:
  voice-recognition:
    build:
      context: .
      dockerfile: Dockerfile
    image: voice-recognition:latest
    container_name: voice-recognition
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8000:8000"
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL}
      WHISPER_DEVICE: ${WHISPER_DEVICE}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE}
      WHISPER_MODEL_DIR: /models
      API_HOST: 0.0.0.0
      API_PORT: 8000
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-1000}
    volumes:
      - ./data/models:/models
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=5).status==200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
